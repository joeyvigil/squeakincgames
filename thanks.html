<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Message Sent | squeak inc.</title>
  <meta name="robots" content="noindex">
  <meta name="description" content="Thanks for reaching out to Squeak Inc. — we'll be in touch.">

  <link href="/assets/img/favicon.png" rel="icon">
  <link href="/assets/img/apple-touch-icon.png" rel="apple-touch-icon">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#df8e1d">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600,700&display=swap" rel="stylesheet">

  <style>
    :root { --navbar: #df8e1d; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      font-family: "Poppins", sans-serif; color: #2c2c2c; background: #fff;
    }
    img.logo { max-width: 280px; width: 60%; height: auto; margin-bottom: 2rem; }
    .check {
      width: 84px; height: 84px; border-radius: 50%;
      background: var(--navbar); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; line-height: 1; margin-bottom: 1.5rem;
    }
    h1 { font-size: clamp(2rem, 7vw, 3rem); margin: 0; color: var(--navbar); line-height: 1.1; }
    p.lead { font-size: 1.2rem; margin: 0.75rem 0 2rem; max-width: 32rem; }
    a.btn {
      display: inline-block; padding: 0.8rem 2rem; border-radius: 50px;
      background: var(--navbar); color: #fff; text-decoration: none; font-weight: 600;
      transition: opacity 0.2s ease;
    }
    a.btn:hover { opacity: 0.85; }
    nav.links { margin-top: 1.5rem; }
    nav.links a { color: var(--navbar); text-decoration: none; margin: 0 0.6rem; font-weight: 600; }
    nav.links a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <a href="/"><img class="logo" src="/assets/img/logo.png" alt="Squeak Inc."></a>
  <div class="check" aria-hidden="true">&check;</div>
  <h1>Message sent!</h1>
  <p class="lead">Thanks for reaching out — your message squeaked through. We'll get back to you as soon as we can.</p>
  <a class="btn" href="/">Back to home</a>
  <nav class="links">
    <a href="/games">Our Games</a>
    <a href="/blog">Blog</a>
    <a href="/about">About</a>
  </nav>
</body>

</html>
